name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }} / nvim ${{ matrix.nvim }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        nvim: [stable, nightly]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}

      - name: Checkout plenary.nvim
        uses: actions/checkout@v4
        with:
          repository: nvim-lua/plenary.nvim
          path: tests/plenary

      - name: Run tests
        shell: bash
        run: |
          # PlenaryBustedDirectory spawns pwsh on Windows runners to enumerate
          # *_spec.lua files, and pwsh's 5s startup blows plenary's timeout.
          # Enumerate in shell instead and run each spec in its own nvim
          # invocation — works identically on Linux / macOS / Windows.
          set -e
          status=0
          for spec in tests/rvpm/*_spec.lua; do
            echo "::group::$spec"
            nvim --headless --noplugin -u tests/minimal_init.lua \
              -c "PlenaryBustedFile $spec" || status=$?
            echo "::endgroup::"
          done
          exit $status
